name: Run tests

on: [push]

env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node: ['22.12.0']
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:ci
      - uses: codecov/codecov-action@v4

  test-e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node: ['22.12.0']
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Resolve Electron binary
        run: |
          electron_path="$(pnpm --filter electron-trpc exec node -e 'console.log(require("electron"))')"
          echo "PLAYWRIGHT_ELECTRON_PATH=$electron_path" >> "$GITHUB_ENV"
      - name: Install Playwright runtime dependencies
        run: pnpm exec playwright install-deps
      - run: pnpm build
      - run: xvfb-run --auto-servernum -- pnpm test:e2e
